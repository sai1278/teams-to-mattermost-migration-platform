name: ci

"on":
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  semantic-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      statuses: write
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            apps/parser/pyproject.toml
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e apps/parser
      - name: Ruff lint
        run: ruff check apps/parser/src apps/parser/tests tests conftest.py
      - name: Ruff format check
        run: ruff format --check apps/parser/src apps/parser/tests tests conftest.py
      - name: mypy
        run: mypy apps/parser/src apps/parser/tests tests conftest.py
      - name: Pytest with coverage
        run: pytest

  shell-and-config:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install shell and config tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt yamllint nodejs npm
          sudo npm install -g markdownlint-cli
      - name: ShellCheck
        run: shellcheck $(find scripts -type f -name '*.sh')
      - name: Shell formatting
        run: shfmt -d scripts
      - name: YAML lint
        run: yamllint .
      - name: Markdown lint
        run: markdownlint README.md CONTRIBUTING.md docs apps

  docker-compose:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Validate core compose
        run: docker compose -f infrastructure/docker/docker-compose.yml config
      - name: Validate monitoring compose
        run: docker compose -f infrastructure/docker/docker-compose.monitoring.yml config
      - name: Build parser image
        run: docker build -f apps/parser/Dockerfile .

  kubernetes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install kustomize
        run: |
          curl -sSL -o kustomize.tar.gz \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.0.1/kustomize_v5.0.1_linux_amd64.tar.gz
          tar -xzf kustomize.tar.gz kustomize || true
          sudo mv kustomize /usr/local/bin/kustomize
      - name: Install kubeconform
        run: |
          curl -sSL -o kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform
      - name: Build local overlay
        run: kustomize build infrastructure/kubernetes/overlays/local > local-manifests.yaml
      - name: Build staging overlay
        run: kustomize build infrastructure/kubernetes/overlays/staging > staging-manifests.yaml
      - name: Validate manifests
        run: |
          kubeconform -strict -summary local-manifests.yaml
          kubeconform -strict -summary staging-manifests.yaml
