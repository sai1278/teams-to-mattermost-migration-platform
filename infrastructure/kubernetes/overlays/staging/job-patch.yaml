apiVersion: batch/v1
kind: Job
metadata:
  name: parser-job
  namespace: teams-mattermost-migration
spec:
  template:
    spec:
      containers:
        - name: parser
          image: ghcr.io/example/teams-mattermost-parser:staging
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
