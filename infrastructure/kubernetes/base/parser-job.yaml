apiVersion: batch/v1
kind: Job
metadata:
  name: parser-job
  namespace: teams-mattermost-migration
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: parser-job
    spec:
      restartPolicy: Never
      serviceAccountName: parser-runner
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: parser
          image: ghcr.io/example/teams-mattermost-parser:latest
          imagePullPolicy: IfNotPresent
          args:
            - --input
            - $(INPUT_PATH)
            - --output
            - $(OUTPUT_PATH)
          envFrom:
            - configMapRef:
                name: parser-config
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
