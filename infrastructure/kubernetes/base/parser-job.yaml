apiVersion: batch/v1
kind: Job
metadata:
  name: parser-job
  namespace: teams-mattermost-migration
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: parser-job
    spec:
      restartPolicy: Never
      serviceAccountName: parser-runner
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: parser
          image: ghcr.io/example/teams-mattermost-parser@sha256:e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          args:
            - --input
            - $(INPUT_PATH)
            - --output
            - $(OUTPUT_PATH)
          envFrom:
            - configMapRef:
                name: parser-config
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: data-volume
              mountPath: /data
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: parser-data-pvc
        - name: tmp-volume
          emptyDir: {}
